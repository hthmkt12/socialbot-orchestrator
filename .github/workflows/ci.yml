name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build worker
        run: npm run build:worker

      - name: Build gateway
        run: npm run build:gateway

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Unit Tests
        run: npm test

  python-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bridge unit tests
        run: python -m unittest discover -s services/mobile-mcp-bridge/tests -p "test_*.py"

      - name: Bridge compile check
        run: python -m py_compile services/mobile-mcp-bridge/src/android_session_manager.py services/mobile-mcp-bridge/src/bridge_server.py services/mobile-mcp-bridge/src/json_response.py
