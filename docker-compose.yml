services:
  frontend:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ACCOUNT_PASSWORD_KEY: ${VITE_ACCOUNT_PASSWORD_KEY}
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      worker:
        condition: service_started

  worker:
    build:
      context: services/execution-worker
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DEVICE_BACKEND: ${DEVICE_BACKEND:-mobile-mcp}
      MOBILE_MCP_BRIDGE_URL: ${MOBILE_MCP_BRIDGE_URL:-http://host.docker.internal:4321}
      MOBILE_MCP_BRIDGE_TOKEN: ${MOBILE_MCP_BRIDGE_TOKEN}
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-http://gateway:8080}
      DEVICE_COMMAND_TIMEOUT_MS: "30000"
      RUN_POLL_INTERVAL_MS: "5000"
      RUN_LEASE_TTL_MS: "60000"
    ports:
      - "4310:4310"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gateway:
    build:
      context: services/laixi-gateway
    ports:
      - "8080:8080"
    restart: unless-stopped
